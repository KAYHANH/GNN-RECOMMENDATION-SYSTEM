name: Evaluate Recommender

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull tracked artifacts with DVC
        run: dvc pull
        continue-on-error: true

      - name: Run evaluation harness
        run: python training/evaluate.py --transactions data/transactions_cleaned.csv --output artifacts/metrics.json

      - name: Guard minimum offline quality
        run: |
          python -c "import json; m = json.load(open('artifacts/metrics.json')); assert m['Recall@10'] > 0.08, f'Recall degraded: {m}'"

