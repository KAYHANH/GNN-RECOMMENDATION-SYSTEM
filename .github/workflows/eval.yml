name: Evaluate Recommender

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install evaluation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run evaluation harness
        run: python -m training.evaluate --transactions data/transactions_cleaned.csv --output artifacts/metrics.json

      - name: Guard minimum offline quality
        run: |
          python -c "import json; m = json.load(open('artifacts/metrics.json')); assert m['Recall@10'] > 0.015, f'Recall degraded: {m}'"
